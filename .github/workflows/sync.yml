name: Ecza1 -> Qukasoft XML Senkronizasyonu

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketleri kur
        run: pip install requests

      - name: Senkronizasyonu çalıştır
        env:
          ECZA1_USER: ${{ secrets.ECZA1_USER }}
          ECZA1_PASS: ${{ secrets.ECZA1_PASS }}
        run: python ecza1_sync_v2.py

      - name: Değişiklikleri commit'le ve gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ecza1-feed.xml sync.log
          git diff --quiet --cached || git commit -m "Ecza1 ürün listesi güncellendi"
          git push
