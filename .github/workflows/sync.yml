name: Ecza1 -> Qukasoft XML Senkronizasyonu

on:
  schedule:
    # Her saat başı çalışır (UTC saatine göre; Türkiye UTC+3'tür).
    # Ayarı değiştirmek istersen: https://crontab.guru adresinden yeni ifade üretebilirsin.
    - cron: '0 * * * *'
  workflow_dispatch:
    # Bu satır sayesinde "Actions" sekmesinden butona basarak manuel de çalıştırabilirsin.

permissions:
  contents: write   # Script'in ürettiği XML dosyasını repoya commit edebilmesi için gerekli

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketleri kur
        run: pip install requests

      - name: Ecza1 (tüm mağazalar) senkronizasyonunu çalıştır
        env:
          ECZA1_USER: ${{ secrets.ECZA1_USER }}
          ECZA1_PASS: ${{ secrets.ECZA1_PASS }}
        run: python ecza1_multi_sync.py

      - name: Farmazon senkronizasyonunu çalıştır
        env:
          FARMAZON_USER: ${{ secrets.FARMAZON_USER }}
          FARMAZON_PASS: ${{ secrets.FARMAZON_PASS }}
        run: python farmazon_sync.py
        continue-on-error: true

      # Toptancozum GitHub Actions'ın IP'sinden engellendiği için şimdilik
      # devre dışı - Türkiye VPS'e taşındığında tekrar aktif edilecek.
      # - name: Toptancozum senkronizasyonunu çalıştır
      #   env:
      #     TOPTANCOZUM_EMAIL: ${{ secrets.TOPTANCOZUM_EMAIL }}
      #     TOPTANCOZUM_PASS: ${{ secrets.TOPTANCOZUM_PASS }}
      #   run: python toptancozum_sync.py
      #   continue-on-error: true

      - name: Değişiklikleri commit'le ve gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ecza1-store-*.xml docs/farmazon-store-*.xml sync.log sync_farmazon.log
          git diff --quiet --cached || git commit -m "Ürün listeleri güncellendi"
          git push
