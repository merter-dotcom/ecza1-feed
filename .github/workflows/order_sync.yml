name: Qukasoft Siparişleri -> Ecza1 Sepete Ekleme

on:
  schedule:
    # Her 30 dakikada bir çalışır (UTC saatine göre)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # "Run workflow" butonuyla manuel çalıştırma imkanı

permissions:
  contents: write

jobs:
  process_orders:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketleri kur
        run: pip install requests

      - name: Siparişleri işle
        env:
          ECZA1_USER: ${{ secrets.ECZA1_USER }}
          ECZA1_PASS: ${{ secrets.ECZA1_PASS }}
          QUKASOFT_COOKIE: ${{ secrets.QUKASOFT_COOKIE }}
        run: python qukasoft_to_ecza1_orders.py

      - name: İşlenen sipariş kaydını commit'le ve gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_orders.json sync_orders.log
          git diff --quiet --cached || git commit -m "Sipariş işleme kaydı güncellendi"
          git push
